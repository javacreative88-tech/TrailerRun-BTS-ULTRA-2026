<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Program Latihan Trail Run BTS Ultra 18KM 2026 - panduan latihan lengkap, premium, dan siap upload ke hosting biasa."
    />
    <title>Latihan Trail Run BTS Ultra 18KM 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
            },
            colors: {
              forest: {
                50: "#f2f8f3",
                100: "#dfece2",
                200: "#c0d7c6",
                300: "#92b89c",
                400: "#63956f",
                500: "#3f6f4d",
                600: "#30583d",
                700: "#234330",
                800: "#183326",
                900: "#0e241a",
              },
              ember: {
                50: "#fff5eb",
                100: "#ffe6cc",
                200: "#ffcfa0",
                300: "#ffb36a",
                400: "#ff9440",
                500: "#f97316",
                600: "#ea670f",
                700: "#c4510d",
                800: "#9e410f",
                900: "#7f3610",
              },
            },
            boxShadow: {
              soft: "0 18px 50px rgba(15, 23, 42, 0.08)",
              glow: "0 0 0 1px rgba(255,255,255,0.06), 0 20px 60px rgba(249,115,22,0.14)",
            },
            animation: {
              float: "float 6s ease-in-out infinite",
              fadeUp: "fadeUp 0.8s ease forwards",
              pulseSoft: "pulseSoft 3s ease-in-out infinite",
            },
            keyframes: {
              float: {
                "0%, 100%": { transform: "translateY(0px)" },
                "50%": { transform: "translateY(-10px)" },
              },
              fadeUp: {
                "0%": {
                  opacity: "0",
                  transform: "translateY(18px)",
                },
                "100%": {
                  opacity: "1",
                  transform: "translateY(0)",
                },
              },
              pulseSoft: {
                "0%, 100%": {
                  boxShadow: "0 0 0 0 rgba(249,115,22,0.28)",
                },
                "50%": {
                  boxShadow: "0 0 0 12px rgba(249,115,22,0)",
                },
              },
            },
          },
        },
      };
    </script>
    <script
      src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"
      defer
    ></script>
    <script src="assets/js/bootstrap.js" defer></script>
  </head>
  <body
    class="font-sans text-slate-800 antialiased selection:bg-ember-200 selection:text-slate-900"
  >
    <header
      class="sticky top-0 z-50 border-b border-slate-200/70 bg-white/80 backdrop-blur-xl"
    >
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between py-4">
          <a href="#top" class="group flex items-center gap-3">
            <div
              class="flex h-11 w-11 items-center justify-center rounded-2xl bg-gradient-to-br from-forest-700 to-ember-500 text-white shadow-glow"
            >
              <i data-lucide="mountain" class="h-5 w-5"></i>
            </div>
            <div>
              <div
                class="text-sm font-semibold uppercase tracking-[0.22em] text-forest-800"
              >
                DEVI - BTS Ultra
              </div>
              <div class="text-sm text-slate-500">Trail Run 18KM 2026</div>
            </div>
          </a>

          <nav
            class="hidden items-center gap-1 lg:flex"
            aria-label="Navigasi utama"
          >
            <a
              href="#tentang"
              class="nav-link rounded-full px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100"
              >Tentang</a
            >
            <a
              href="#target"
              class="nav-link rounded-full px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100"
              >Target</a
            >
            <a
              href="#program"
              class="nav-link rounded-full px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100"
              >Program</a
            >
            <a
              href="#intensitas"
              class="nav-link rounded-full px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100"
              >Intensitas</a
            >
            <a
              href="#gear"
              class="nav-link rounded-full px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100"
              >Gear</a
            >
            <a
              href="#faq"
              class="nav-link rounded-full px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100"
              >FAQ</a
            >
          </nav>

          <div class="hidden items-center gap-3 md:flex">
            <a
              href="#program"
              class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 shadow-sm transition hover:border-ember-300 hover:text-ember-700"
              >Lihat Program</a
            >
            <a
              href="#cta"
              class="rounded-full bg-forest-800 px-4 py-2 text-sm font-semibold text-white shadow-soft transition hover:bg-forest-700"
              >Mulai Latihan</a
            >
          </div>

          <button
            id="menuBtn"
            class="inline-flex h-11 w-11 items-center justify-center rounded-2xl border border-slate-200 bg-white text-slate-700 shadow-sm lg:hidden"
            aria-label="Buka menu"
            aria-controls="mobileMenu"
            aria-expanded="false"
          >
            <i data-lucide="menu" class="h-5 w-5"></i>
          </button>
        </div>

        <div id="mobileMenu" class="hidden pb-4 lg:hidden">
          <div class="glass rounded-2xl border border-white/60 p-3 shadow-soft">
            <div class="grid gap-2 sm:grid-cols-2">
              <a
                href="#tentang"
                class="rounded-xl px-4 py-3 text-sm font-medium text-slate-700 hover:bg-slate-100"
                >Tentang Program</a
              >
              <a
                href="#target"
                class="rounded-xl px-4 py-3 text-sm font-medium text-slate-700 hover:bg-slate-100"
                >Ringkasan Target</a
              >
              <a
                href="#program"
                class="rounded-xl px-4 py-3 text-sm font-medium text-slate-700 hover:bg-slate-100"
                >Program 16 Minggu</a
              >
              <a
                href="#gear"
                class="rounded-xl px-4 py-3 text-sm font-medium text-slate-700 hover:bg-slate-100"
                >Gear & Nutrisi</a
              >
            </div>
          </div>
        </div>
      </div>
    </header>

    <main id="top">
      <div id="fragment-hero"></div>
      <div id="fragment-program"></div>
      <div id="fragment-support"></div>
      <div id="fragment-faq-footer"></div>
    </main>
  </body>
</html>
